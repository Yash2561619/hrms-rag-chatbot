{% extends 'base.html' %}

{% block content %}

<div class="container-fluid py-3">


<!-- Page Header -->
<div class="d-flex justify-content-between align-items-center mb-4">

    <div>
        <h2 class="fw-bold mb-1">
            <i class="bi bi-person-plus-fill text-primary me-2"></i>
            Add New Employee
        </h2>

        <p class="text-muted mb-0">
            Create a new employee profile and assign department details
        </p>
    </div>

    <a href="/employees"
       class="btn btn-outline-secondary rounded-pill px-4">

        <i class="bi bi-arrow-left me-2"></i>
        Back to Employees

    </a>

</div>

<!-- Form Card -->
<div class="card shadow-sm border-0 rounded-4 overflow-hidden">

    <!-- Card Header -->
    <div class="bg-primary text-white px-4 py-3">

        <div class="d-flex align-items-center">

            <div class="bg-white bg-opacity-25 rounded-circle p-2 me-3">
                <i class="bi bi-person-vcard fs-4"></i>
            </div>

            <div>
                <h5 class="mb-0 fw-semibold">Employee Information</h5>
                <small class="opacity-75">Fill all required employee details</small>
            </div>

        </div>

    </div>

    <!-- Card Body -->
    <div class="card-body p-4">

        <form method="POST">

            <div class="row g-4">

                <!-- Employee ID -->
                <div class="col-lg-6">

                    <label class="form-label fw-semibold">
                        <i class="bi bi-person-badge text-primary me-1"></i>
                        Employee ID
                    </label>

                    <input type="text"
                           name="employee_id"
                           class="form-control form-control-lg rounded-3"
                           placeholder="EMP001"
                           required>

                </div>

                <!-- Employee Name -->
                <div class="col-lg-6">

                    <label class="form-label fw-semibold">
                        <i class="bi bi-person text-primary me-1"></i>
                        Full Name
                    </label>

                    <input type="text"
                           name="name"
                           class="form-control form-control-lg rounded-3"
                           placeholder="Enter employee full name"
                           required>

                </div>

                <!-- WhatsApp Number -->
                <div class="col-lg-6">

                    <label class="form-label fw-semibold">
                        <i class="bi bi-whatsapp text-success me-1"></i>
                        WhatsApp Number
                    </label>

                    <div class="input-group input-group-lg">

                        <select class="form-select rounded-start-3"
                                name="country_code"
                                style="max-width: 150px;"
                                required>

                            <option value="91" selected>🇮🇳 +91</option>
                            <option value="1">🇺🇸 +1</option>
                            <option value="44">🇬🇧 +44</option>
                            <option value="971">🇦🇪 +971</option>

                        </select>

                        <input type="tel"
                               name="whatsapp"
                               class="form-control rounded-end-3"
                               placeholder="Enter 10-digit mobile number"
                               maxlength="10"
                               pattern="[0-9]{10}"
                               inputmode="numeric"
                               required>

                    </div>

                    <div class="form-text">
                        Enter only the 10-digit mobile number (country code is selected separately).
                    </div>

                </div>

                <!-- Department -->
                <div class="col-lg-6">

                    <label class="form-label fw-semibold">
                        <i class="bi bi-building text-primary me-1"></i>
                        Department
                    </label>

                    <select name="department"
                            class="form-select form-select-lg rounded-3"
                            required>

                        <option value="">Select Department</option>
                        <option value="Engineering">Engineering</option>
                        <option value="HR">Human Resources</option>
                        <option value="Finance">Finance</option>
                        <option value="Operations">Operations</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Support">Customer Support</option>

                    </select>

                </div>

                <!-- Manager -->
                <div class="col-lg-6">

                    <label class="form-label fw-semibold">
                        <i class="bi bi-person-workspace text-primary me-1"></i>
                        Reporting Manager
                    </label>

                    <input type="text"
                           name="manager"
                           class="form-control form-control-lg rounded-3"
                           placeholder="Enter manager name"
                           required>

                </div>

            </div>

            <!-- Action Buttons -->
            <div class="d-flex flex-wrap gap-3 mt-5 pt-3 border-top">

                <button type="submit"
                        class="btn btn-primary btn-lg rounded-pill px-5 shadow-sm">

                    <i class="bi bi-check-circle-fill me-2"></i>
                    Add Employee

                </button>

                <a href="/employees"
                   class="btn btn-light btn-lg rounded-pill px-5 border">

                    <i class="bi bi-x-circle me-2"></i>
                    Cancel

                </a>

            </div>

        </form>

    </div>

</div>


</div>

<!-- Phone Validation Script -->

<script>
document.addEventListener('DOMContentLoaded', function () {

    const phoneInput = document.querySelector('input[name="whatsapp"]');

    // Allow only digits while typing
    phoneInput.addEventListener('input', function () {

        this.value = this.value.replace(/\D/g, '');

        if (this.value.length > 10) {
            this.value = this.value.slice(0, 10);
        }
    });

    // Validate before form submit
    phoneInput.form.addEventListener('submit', function (e) {

        if (phoneInput.value.length !== 10) {

            e.preventDefault();

            alert('Please enter exactly 10 digits');
        }
    });

});
</script>

{% endblock %}
