```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ApexHR - Sign In</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }

        .brand {
            background: #2563eb;
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .form-section {
            padding: 2rem;
            background: white;
        }

        .btn-primary {
            padding: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="card shadow-lg login-card">

    <div class="brand">
        <h2 class="mb-1">🏢 ApexHR</h2>
        <p class="mb-0">HR Administration Portal</p>
    </div>

    <div class="form-section">

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="admin@apexhr.com"
                    required>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Sign In
            </button>

        </form>

    </div>

</div>

</body>
</html>
```
